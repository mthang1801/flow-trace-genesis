name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  render:
    name: render pipeline (golden grpc-go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python3 -m pip install pyyaml
      - name: build golden
        run: python3 plugins/flow-trace-genesis/skills/flow-trace-genesis/render/build.py examples/grpc-go/docs/flows/unary-invoke-client
      - name: check golden
        run: python3 plugins/flow-trace-genesis/skills/flow-trace-genesis/render/check.py examples/grpc-go/docs/flows/unary-invoke-client

  doctor:
    name: doctor.sh smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python3 -m pip install pyyaml
      - run: ./installers/doctor.sh

  shellcheck:
    name: shellcheck installers + scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: shellcheck installers/install.sh installers/doctor.sh scripts/check-render-sync.sh

  render-sync:
    name: no-fork guard (render/ mirrors)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: fail if a second unsynced render/ copy appears in-repo
        run: |
          mapfile -t dirs < <(find . -name build.py -not -path './.git/*' -exec dirname {} \;)
          echo "render/ copies found: ${dirs[*]}"
          if [ "${#dirs[@]}" -gt 1 ]; then
            ./scripts/check-render-sync.sh "${dirs[@]}"
          fi
